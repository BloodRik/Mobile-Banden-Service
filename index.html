    <!-- Global Error Catcher & Diagnostics to troubleshoot blank preview screen -->
    <script>
      (function() {
        var logs = [];
        function log(type, msg) {
          logs.push({type: type, time: new Date().toLocaleTimeString(), message: msg});
          updateWidget();
        }
        
        // Intercept console messages
        var originalLog = console.log;
        var originalError = console.error;
        var originalWarn = console.warn;
        
        console.log = function() {
          var args = Array.prototype.slice.call(arguments);
          originalLog.apply(console, args);
          log('info', args.map(function(x) { return typeof x === 'object' ? JSON.stringify(x) : String(x); }).join(' '));
        };
        console.error = function() {
          var args = Array.prototype.slice.call(arguments);
          originalError.apply(console, args);
          log('error', args.map(function(x) { return typeof x === 'object' ? JSON.stringify(x) : String(x); }).join(' '));
        };
        console.warn = function() {
          var args = Array.prototype.slice.call(arguments);
          originalWarn.apply(console, args);
          log('warn', args.map(function(x) { return typeof x === 'object' ? JSON.stringify(x) : String(x); }).join(' '));
        };

        window.addEventListener('error', function(e) {
          log('error', 'Unhandled error: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
          var errorDiv = document.createElement('div');
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '0';
          errorDiv.style.left = '0';
          errorDiv.style.width = '100vw';
          errorDiv.style.height = '100vh';
          errorDiv.style.backgroundColor = '#110000';
          errorDiv.style.color = '#ff4444';
          errorDiv.style.padding = '24px';
          errorDiv.style.zIndex = '999999';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.fontSize = '14px';
          errorDiv.style.overflow = 'auto';
          errorDiv.innerHTML = '<h1 style="color:#ff2222;font-size:24px;margin-bottom:16px;">🛑 Global JS Error Detected</h1>' +
            '<p><strong>Message:</strong> ' + e.message + '</p>' +
            '<p><strong>Source:</strong> ' + e.filename + ':' + e.lineno + ':' + e.colno + '</p>' +
            '<p><strong>Error Object:</strong> ' + (e.error ? e.error.toString() : 'None') + '</p>' +
            '<p><strong>Stack trace:</strong></p><pre style="background:#221111;padding:12px;border:1px solid #442222;color:#ff8888;">' + (e.error && e.error.stack ? e.error.stack : 'No stack available') + '</pre>';
          document.body.appendChild(errorDiv);
        });

        window.addEventListener('unhandledrejection', function(e) {
          log('error', 'Unhandled promise rejection: ' + e.reason);
          var errorDiv = document.createElement('div');
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '0';
          errorDiv.style.left = '0';
          errorDiv.style.width = '100vw';
          errorDiv.style.height = '100vh';
          errorDiv.style.backgroundColor = '#110000';
          errorDiv.style.color = '#ff4444';
          errorDiv.style.padding = '24px';
          errorDiv.style.zIndex = '999999';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.fontSize = '14px';
          errorDiv.style.overflow = 'auto';
          errorDiv.innerHTML = '<h1 style="color:#ff2222;font-size:24px;margin-bottom:16px;">🛑 Unhandled Promise Rejection</h1>' +
            '<p><strong>Reason:</strong> ' + e.reason + '</p>' +
            '<p><strong>Stack trace:</strong></p><pre style="background:#221111;padding:12px;border:1px solid #442222;color:#ff8888;">' + (e.reason && e.reason.stack ? e.reason.stack : 'No stack available') + '</pre>';
          document.body.appendChild(errorDiv);
        });

        document.addEventListener('DOMContentLoaded', function() {
          log('info', 'DOM Content Loaded.');
        });
        window.addEventListener('load', function() {
          log('info', 'Window Loaded.');
        });

        var widget = null;
        function updateWidget() {
          if (!widget) {
            widget = document.createElement('div');
            widget.id = 'debug-widget';
            widget.style.position = 'fixed';
            widget.style.bottom = '12px';
            widget.style.left = '12px';
            widget.style.background = 'rgba(15,15,15,0.9)';
            widget.style.border = '1px solid #333';
            widget.style.borderRadius = '8px';
            widget.style.padding = '8px 12px';
            widget.style.color = '#ccc';
            widget.style.fontSize = '11px';
            widget.style.fontFamily = 'monospace';
            widget.style.zIndex = '99999';
            widget.style.cursor = 'pointer';
            widget.style.boxShadow = '0 4px 12px rgba(0,0,0,0.5)';
            widget.onclick = function() {
              var panel = document.getElementById('debug-panel');
              if (panel) panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            };
            document.documentElement.appendChild(widget);
          }
          
          var errors = logs.filter(function(x) { return x.type === 'error'; }).length;
          var warnings = logs.filter(function(x) { return x.type === 'warn'; }).length;
          widget.innerHTML = '⚙️ Debug Logs (' + logs.length + ')' + 
            (errors ? ' <span style="color:#ff4444;">🔴 ' + errors + '</span>' : '') +
            (warnings ? ' <span style="color:#ffbb00;">🟡 ' + warnings + '</span>' : '') +
            ' | Click to view';

          var panel = document.getElementById('debug-panel');
          if (panel) {
            var html = '<div style="margin-bottom:12px;font-size:14px;font-weight:bold;color:#fff;">Diagnostic Log Console</div>';
            for (var i = 0; i < logs.length; i++) {
              var l = logs[i];
              var color = l.type === 'error' ? '#ff4444' : l.type === 'warn' ? '#ffbb00' : '#ccc';
              html += '<div style="margin-bottom:4px;color:' + color + ';border-bottom:1px solid #222;padding-bottom:4px;">[' + l.time + '] [' + l.type.toUpperCase() + '] ' + l.message + '</div>';
            }
            document.getElementById('debug-log-container').innerHTML = html;
          }
        }

        document.addEventListener('DOMContentLoaded', function() {
          var panel = document.createElement('div');
          panel.id = 'debug-panel';
          panel.style.display = 'none';
          panel.style.position = 'fixed';
          panel.style.bottom = '50px';
          panel.style.left = '12px';
          panel.style.width = '450px';
          panel.style.maxHeight = '400px';
          panel.style.background = '#0a0a0a';
          panel.style.border = '1px solid #444';
          panel.style.borderRadius = '12px';
          panel.style.padding = '16px';
          panel.style.color = '#eee';
          panel.style.fontFamily = 'monospace';
          panel.style.fontSize = '11px';
          panel.style.overflow = 'auto';
          panel.style.zIndex = '99998';
          panel.style.boxShadow = '0 10px 30px rgba(0,0,0,0.8)';
          
          var container = document.createElement('div');
          container.id = 'debug-log-container';
          panel.appendChild(container);
          
          document.body.appendChild(panel);
          updateWidget();
        });
      })();
    </script>
